<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History</title>
</head>
<body>

<div class="phone" style="
background:#f8fbff;
min-height:100vh;">

<div style="
padding:22px;
background:linear-gradient(135deg,#2ea44f,#53c96b);
color:white;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;">

<div onclick="location.href='/home'"
style="font-size:28px;cursor:pointer;">
←
</div>

<div style="
font-size:24px;
font-weight:700;">

{{ username }} History

</div>

<div style="width:24px;"></div>

</div>

</div>

<div style="padding:18px;">

{% for item in items %}

<div class="card" style="
margin-bottom:14px;">

<div style="
font-size:22px;
font-weight:700;">

🌿 {{ item.prediction }}

</div>

<div style="
margin-top:8px;
color:#666;">

Confidence: {{ item.confidence }}

</div>

<div style="
margin-top:8px;
font-size:13px;
color:#999;">

{{ item.created }}

</div>

</div>

{% endfor %}

{% if not items %}

<div class="card">

No prediction history yet.

</div>

{% endif %}

</div>

</div>

</body>
</html>
