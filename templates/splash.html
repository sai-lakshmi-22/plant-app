<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splash</title>

<style>
@keyframes zoomFade{
0%{transform:scale(.85);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes floatLeaf{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}
</style>

</head>

<body>

<div class="phone" style="
background:linear-gradient(135deg,#2ea44f,#53c96b,#7be495);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:22px;">

<div style="
text-align:center;
color:white;
animation:zoomFade 1s ease;">

<!-- LOGO -->
<div style="
width:130px;
height:130px;
margin:auto;
border-radius:38px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
box-shadow:0 18px 35px rgba(0,0,0,.16);
animation:floatLeaf 2.2s infinite;">

🌿

</div>

<!-- TITLE -->
<div style="
font-size:34px;
font-weight:700;
margin-top:26px;">

E-Crop Diagnosis

</div>

<!-- SUBTITLE -->
<div style="
font-size:15px;
margin-top:10px;
opacity:.94;
line-height:1.6;">

AI powered crop disease detection<br>
for smarter farming

</div>

<!-- LOADER -->
<div style="
margin-top:34px;">

<div style="
width:170px;
height:7px;
background:rgba(255,255,255,.25);
border-radius:30px;
margin:auto;
overflow:hidden;">

<div id="bar" style="
height:100%;
width:0%;
background:white;
border-radius:30px;
transition:2.4s linear;">

</div>

</div>

<div style="
font-size:13px;
margin-top:12px;
opacity:.9;">

Loading...

</div>

</div>

</div>

</div>

<script>

window.onload = function(){

setTimeout(()=>{
document.getElementById(
"bar"
).style.width = "100%";
},150);

setTimeout(()=>{
location.href="/intro";
},2600);

}

</script>

</body>
</html>
