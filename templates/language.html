<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language</title>
</head>

<body>

<div class="phone" style="
background:linear-gradient(180deg,#eef8f0,#f8fbff);
min-height:100vh;">

<!-- TOP HEADER -->
<div style="
padding:24px 20px 30px;
background:linear-gradient(135deg,#2ea44f,#53c96b);
border-bottom-left-radius:34px;
border-bottom-right-radius:34px;
color:white;
box-shadow:0 12px 30px rgba(46,164,79,.22);">

<div style="
display:flex;
justify-content:space-between;
align-items:center;">

<div onclick="goBack()" style="
font-size:28px;
cursor:pointer;">

←

</div>

<div style="
font-size:20px;
font-weight:700;">

Choose Language

</div>

<div style="width:24px;"></div>

</div>

<div style="
text-align:center;
margin-top:24px;">

<div style="font-size:56px;">🌍</div>

<div style="
font-size:15px;
margin-top:10px;
opacity:.92;">

Use the app in your preferred language

</div>

</div>

</div>

<!-- CONTENT -->
<div style="padding:18px;">

<div style="
background:white;
border-radius:30px;
padding:20px;
box-shadow:0 12px 30px rgba(0,0,0,.08);">

<div style="
font-size:24px;
font-weight:700;">

Select Language

</div>

<div style="
font-size:14px;
color:#666;
margin-top:6px;">

Your choice will apply across the app

</div>

<!-- GRID -->
<div style="
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;">

<button class="langBtn" onclick="setLang('English')">English</button>
<button class="langBtn" onclick="setLang('हिंदी')">हिंदी</button>
<button class="langBtn" onclick="setLang('मराठी')">मराठी</button>
<button class="langBtn" onclick="setLang('ગુજરાતી')">ગુજરાતી</button>
<button class="langBtn" onclick="setLang('ಕನ್ನಡ')">ಕನ್ನಡ</button>
<button class="langBtn" onclick="setLang('മലയാളം')">മലയാളം</button>
<button class="langBtn" onclick="setLang('தமிழ்')">தமிழ்</button>
<button class="langBtn" onclick="setLang('తెలుగు')">తెలుగు</button>

</div>

<!-- CURRENT -->
<div id="currentLang" style="
margin-top:18px;
font-size:14px;
color:#555;
text-align:center;">

Current: English

</div>

<button
class="btn"
style="
width:100%;
margin-top:20px;
background:#2ea44f;"
onclick="goNext()">

Continue

</button>

</div>

</div>

</div>

<style>

.langBtn{
border:none;
padding:14px;
border-radius:18px;
background:#f3f6f4;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

.langBtn:hover{
transform:translateY(-2px);
}

.langBtn.active{
background:#2ea44f;
color:white;
box-shadow:0 10px 18px rgba(46,164,79,.22);
}

</style>

<script>

let selected =
localStorage.getItem("lang") || "English";

updateUI();

function setLang(lang){

selected = lang;
localStorage.setItem("lang", lang);
updateUI();

}

function updateUI(){

document.getElementById(
"currentLang"
).innerText =
"Current: " + selected;

const btns =
document.querySelectorAll(".langBtn");

btns.forEach(btn=>{

btn.classList.remove("active");

if(btn.innerText.trim() === selected){
btn.classList.add("active");
}

});

}

function goBack(){
location.href="/intro";
}

function goNext(){
location.href="/login";
}

</script>

</body>
</html>
