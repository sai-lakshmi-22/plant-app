<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="stylesheet" href="/static/style.css">

<style>
body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#eef8f0,#f8fbff);
}

.page{
max-width:430px;
margin:auto;
min-height:100vh;
padding-bottom:95px;
}

.top{
background:linear-gradient(135deg,#2ea44f,#53c96b);
padding:24px 18px 30px;
color:#fff;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.toprow{
display:flex;
justify-content:space-between;
align-items:center;
}

.welcome{
font-size:14px;
opacity:.92;
}

.name{
font-size:30px;
font-weight:700;
margin-top:6px;
}

.badge{
background:rgba(255,255,255,.18);
padding:10px 14px;
border-radius:18px;
font-size:14px;
cursor:pointer;
}

.weather{
margin-top:18px;
background:rgba(255,255,255,.18);
padding:12px 16px;
border-radius:18px;
font-size:15px;
}

.wrap{
padding:18px;
}

.card{
background:#fff;
padding:18px;
border-radius:28px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
margin-bottom:16px;
}

.title{
font-size:24px;
font-weight:700;
}

.sub{
font-size:14px;
color:#666;
margin-top:6px;
}

.btn{
width:100%;
margin-top:16px;
padding:15px;
border:none;
border-radius:22px;
background:linear-gradient(135deg,#2ea44f,#53c96b);
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.iconcard{
background:#fff;
padding:18px;
border-radius:24px;
box-shadow:0 10px 22px rgba(0,0,0,.05);
text-align:center;
cursor:pointer;
}

.icon{
font-size:34px;
}

.text{
font-weight:700;
margin-top:10px;
font-size:15px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:430px;
margin:auto;
display:grid;
grid-template-columns:repeat(4,1fr);
background:#fff;
padding:12px 6px;
text-align:center;
border-top-left-radius:24px;
border-top-right-radius:24px;
box-shadow:0 -10px 25px rgba(0,0,0,.08);
font-size:13px;
font-weight:600;
}

.bottom div{
cursor:pointer;
color:#666;
}

.active{
color:#2ea44f !important;
}
</style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="top">

<div class="toprow">

<div>

<div class="welcome">
Welcome Back
</div>

<div class="name">
{{ username }} 👨‍🌾
</div>

</div>

<div class="badge"
onclick="location.href='/history'">

📜 History

</div>

</div>

<div class="weather">
🌤️ Good weather for farming today
</div>

</div>

<!-- BODY -->
<div class="wrap">

<!-- MAIN CARD -->
<div class="card">

<div class="title">
Instant Crop Scan
</div>

<div class="sub">
Use AI to detect crop disease in seconds.
</div>

<button class="btn"
onclick="location.href='/predict-page'">

📷 Scan Now

</button>

</div>

<!-- GRID -->
<div class="grid">

<!-- HISTORY -->
<div class="iconcard"
onclick="location.href='/history'">

<div class="icon">📜</div>

<div class="text">
History
</div>

</div>

<!-- TREATMENT -->
<div class="iconcard"
onclick="location.href='/treatment'">

<div class="icon">💊</div>

<div class="text">
Treatment Guide
</div>

</div>

<!-- WEATHER -->
<div class="iconcard"
onclick="location.href='/weather'">

<div class="icon">🌦️</div>

<div class="text">
Weather
</div>

</div>

<!-- REPORTS -->
<div class="iconcard"
onclick="location.href='/reports'">

<div class="icon">📊</div>

<div class="text">
Reports
</div>

</div>

</div>

<!-- LOGOUT -->
<button class="btn"
style="
margin-top:20px;
background:#222;"
onclick="location.href='/logout'">

Logout

</button>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">

<div class="active">
🏠<br>Home
</div>

<div onclick="location.href='/predict-page'">
📷<br>Scan
</div>

<div onclick="location.href='/history'">
📜<br>History
</div>

<div onclick="location.href='/logout'">
👤<br>Logout
</div>

</div>

</div>

</body>
</html>
