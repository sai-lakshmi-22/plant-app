<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treatment Guide</title>
<link rel="stylesheet" href="/static/style.css">

<style>
body{
margin:0;
padding:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#eef8f0,#f8fbff);
}

.page{
max-width:430px;
margin:auto;
min-height:100vh;
}

.top{
background:linear-gradient(135deg,#2ea44f,#53c96b);
padding:24px 18px 30px;
color:#fff;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-size:26px;
}

.title{
font-size:28px;
font-weight:700;
margin-top:14px;
}

.sub{
font-size:14px;
opacity:.95;
margin-top:6px;
line-height:1.5;
}

.card{
background:#fff;
margin:18px;
padding:20px;
border-radius:30px;
box-shadow:0 12px 30px rgba(0,0,0,.07);
}

.label{
font-size:15px;
font-weight:700;
margin-bottom:10px;
color:#333;
}

.dropdown{
width:100%;
padding:15px;
border-radius:18px;
border:1px solid #dce7de;
font-size:15px;
outline:none;
background:#fff;
box-sizing:border-box;
}

.result{
margin-top:18px;
padding:18px;
border-radius:22px;
background:#f8fff8;
line-height:1.8;
font-size:16px;
display:none;
border:1px solid #e1efe4;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:30px;
background:#eaf8ed;
color:#2ea44f;
font-size:13px;
font-weight:700;
margin-bottom:10px;
}

.tip{
margin-top:14px;
font-size:13px;
color:#666;
line-height:1.6;
}
</style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="top">

<div class="topbar">

<div onclick="location.href='/home'"
style="cursor:pointer;">
←
</div>

<div>💊</div>

</div>

<div class="title">
Treatment Guide
</div>

<div class="sub">
Choose disease from dropdown to get instant treatment.
</div>

</div>

<!-- CARD -->
<div class="card">

<div class="label">
Select Disease
</div>

<select
id="disease"
class="dropdown"
onchange="getTreatment()">

<option value="">
🔍 Select disease...
</option>

{% for item in diseases %}

<option value="{{ item.raw }}">
{{ item.nice }}
</option>

{% endfor %}

</select>

<div id="result"
class="result"></div>

<div class="tip">
Treatment uses your selected app language automatically.
</div>

</div>

</div>

<script>

async function getTreatment(){

const disease =
document.getElementById(
"disease"
).value;

if(disease === ""){
return;
}

const lang =
localStorage.getItem(
"lang"
) || "English";

const resultBox =
document.getElementById(
"result"
);

resultBox.style.display =
"block";

resultBox.innerHTML =
"⏳ Loading treatment...";

const res =
await fetch(
"/get-treatment",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
disease:disease,
lang:lang
})
}
);

const data =
await res.json();

let sevColor = "#f0ad4e";

if(data.severity === "High")
sevColor = "#dc3545";

if(data.severity === "None")
sevColor = "#28a745";

resultBox.innerHTML =

"<div class='badge'>Recommended Care</div>" +

"<br>🌿 <b>" +
data.name +
"</b><br><br>" +

"💊 <b>Treatment:</b><br>" +
data.treatment +

"<br><br>🧪 <b>Medicine:</b><br>" +
data.medicine +

"<br><br>🛡️ <b>Prevention:</b><br>" +
data.prevention +

"<br><br><span style='background:" +
sevColor +
";color:white;padding:6px 12px;border-radius:30px;font-size:13px;'>Severity: " +
data.severity +
"</span>";

}

</script>

</body>
</html>
